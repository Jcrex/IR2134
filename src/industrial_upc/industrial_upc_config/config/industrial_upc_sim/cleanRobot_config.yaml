# FLEET CONFIG
# =================================================================
# Flota de limpieza (cleanRobot) para el edificio Industrial UPC.
#
# CAMPOS DEPENDIENTES DEL MAPA (rellenar tras dibujarlo en traffic-editor):
#   - rmf_fleet.robots.*.start.map_name / charger / waypoint : nivel y waypoints reales.
#   - fleet_manager.action_paths.clean.<zona> : la clave <zona> debe ser un WAYPOINT
#       real del nav graph; `path` es el recorrido [x,y,yaw] que el robot hace al limpiar
#       (lazo pequeño alrededor del waypoint, en coords del nivel).
# Recordatorio: `actions: ["clean"]` es lo que DECLARA la acción (task_capabilities.clean
# no basta). Lanzar con: dispatch_clean -cs <zona> --use_sim_time

# RMF Fleet parameters
rmf_fleet:
  name: "cleanRobot"
  limits:
    linear: [0.7, 0.75] # velocity, acceleration
    angular: [0.6, 2.0] # velocity, acceleration
  profile: # Robot profile is modelled as a circle
    footprint: 0.3 # radius in m
    vicinity: 0.5 # radius in m
  reversible: True # whether robots in this fleet can reverse
  battery_system:
    voltage: 24.0 # V
    capacity: 40.0 # Ahr
    charging_current: 8.8 # A
  mechanical_system:
    mass: 70.0 # kg
    moment_of_inertia: 40.0 # kgm^2
    friction_coefficient: 0.22
  ambient_system:
    power: 100.0 # W
  tool_system:
    power: 0.0 # W
  recharge_threshold: 0.10 # Battery level below which robots in this fleet will not operate
  recharge_soc: 1.0 # Battery level to which robots in this fleet should be charged up to during recharging tasks
  publish_fleet_state: 10.0 # Publish frequency for fleet state, ensure that it is same as robot_state_update_frequency
  account_for_battery_drain: True
  task_capabilities: # Specify the types of RMF Tasks that robots in this fleet are capable of performing
    loop: True
    delivery: False
  actions: ["clean"]   # DECLARA la acción performable "clean" (imprescindible)
  finishing_request: "park" # [park, charge, nothing]
  robots:
    cleanRobot1:
      charger: "cleanRobot_charger"   # AJUSTAR tras el mapa
      start:
        map_name: "baixa"             # AJUSTAR tras el mapa
        waypoint: "cleanRobot_charger" # AJUSTAR tras el mapa
        orientation: 0.0 # radians
    cleanRobot2:
      charger: "cleanRobot_charger2"  # AJUSTAR tras el mapa
      start:
        map_name: "baixa"             # AJUSTAR tras el mapa
        waypoint: "cleanRobot_charger2" # AJUSTAR tras el mapa
        orientation: 0.0 # radians

fleet_manager:
  ip: "127.0.0.1"
  port: 22013
  user: "some_user"
  password: "some_password"
  robot_state_update_frequency: 10.0
  # AJUSTAR tras el mapa: cada clave debe ser un WAYPOINT real del nav graph y las
  # coordenadas `path` deben corresponder al nivel `map_name`. Ejemplo (placeholder):
  action_paths:
    clean:
      zona_ejemplo:                   # AJUSTAR: nombre de waypoint real
        map_name: "baixa"            # AJUSTAR: nivel real
        path: [ [0.0, 0.0, 0.0],
                [1.5, 0.0, 1.57],
                [1.5, 1.5, 3.14],
                [0.0, 1.5, -1.57],
                [0.0, 0.0, 0.0] ]
        finish_waypoint: "zona_ejemplo" # AJUSTAR
